<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Portal MAIS · Página não encontrada</title>
  <link rel="icon" type="image/png" href="assets/logo-mais.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Inter", system-ui, sans-serif;
      background: #F6F7FB; color: #1F2A44;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      background: white; border: 1px solid rgba(15,23,42,.08);
      border-radius: 20px; padding: 56px 48px;
      max-width: 480px; width: 100%; text-align: center;
      box-shadow: 0 16px 40px rgba(15,23,42,.08);
    }
    .num {
      font-family: "Manrope", sans-serif;
      font-size: 80px; font-weight: 800;
      letter-spacing: -0.04em; line-height: 1;
      background: linear-gradient(135deg, #F88B27, #FBB872);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 16px;
    }
    h1 { font-family: "Manrope", sans-serif; font-size: 24px; font-weight: 700;
      color: #0B1220; margin: 0 0 10px; letter-spacing: -0.01em; }
    p { font-size: 15px; color: #6B7894; margin: 0 0 32px; line-height: 1.55; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: #F88B27; color: white;
      padding: 12px 24px; border-radius: 10px;
      font-weight: 600; font-size: 14px; text-decoration: none;
      transition: background .15s ease;
    }
    a:hover { background: #E07512; }
  </style>
</head>
<body>
  <div class="card">
    <div class="num">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido. Volte ao portal para acessar os manuais.</p>
    <a href="index.html">← Voltar ao portal</a>
  </div>
</body>
</html>
